<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>윤우 생각 📖</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

body.theme-dark  { --bg:#0f0f1a; --bg2:#1a1a2e; --bg3:#16213e; --card:#ffffff0f; --border:#ffffff22; --text:#eeeeee; --text2:#aaaaaa; --text3:#666666; --primary:#6C63FF; --primary2:#9C88FF; --gold:#E9C46A; --gold2:#F4A261; }
body.theme-light { --bg:#f0f4ff; --bg2:#ffffff; --bg3:#e8eeff; --card:#ffffff; --border:#dde3ff; --text:#1a1a3e; --text2:#555577; --text3:#9999aa; --primary:#3355ff; --primary2:#6688ff; --gold:#ffaa00; --gold2:#ff6633; }
body.theme-pink  { --bg:#fff0f5; --bg2:#ffe4ef; --bg3:#ffd6e7; --card:#ffffffcc; --border:#ffb3d1; --text:#4a1030; --text2:#884466; --text3:#cc88aa; --primary:#ff4488; --primary2:#ff77aa; --gold:#ff88cc; --gold2:#ffaadd; }

body { background: var(--bg); color: var(--text); }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }
.header { background: linear-gradient(135deg, var(--bg2), var(--bg3)); padding: 24px 20px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tabs { display: flex; gap: 8px; margin-top: 16px; }
.tab { flex: 1; border: none; border-radius: 10px; padding: 8px 0; font-size: 12px; transition: all 0.2s; }
.tab.on { background: var(--primary); color: #fff; font-weight: 700; }
.tab.off { background: var(--card); color: var(--text2); border: 1px solid var(--border); }
.content { padding: 20px 16px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; cursor: pointer; }
.btn { border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-full { width: 100%; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-sub { background: var(--card); color: var(--text2); border: 1px solid var(--border) !important; }
.btn-danger { background: #ff4444; color: #fff; }
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1a2e; }
.inp { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 14px; margin-bottom: 10px; display: block; outline: none; }
textarea.inp { resize: none; }
.modal { display: none; position: fixed; inset: 0; background: #00000099; align-items: flex-end; z-index: 200; }
.modal.open { display: flex; }
.modal-box { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-width: 480px; margin: 0 auto; max-height: 88vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.row { display: flex; gap: 8px; }
.badge { border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-block; }

/* 사진 뷰어 */
.photo-viewer { display: none; position: fixed; inset: 0; background: #000000ee; z-index: 999; align-items: center; justify-content: center; flex-direction: column; }
.photo-viewer.open { display: flex; }
.photo-viewer img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 8px; }
.photo-viewer-close { position: absolute; top: 20px; right: 20px; background: #ffffff33; border: none; border-radius: 50%; width: 40px; height: 40px; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.photo-viewer-nav { display: flex; gap: 16px; margin-top: 16px; }
.photo-viewer-nav button { background: #ffffff33; border: none; border-radius: 20px; padding: 8px 20px; color: #fff; font-size: 14px; cursor: pointer; }

/* 사진 그리드 */
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 10px; }
.photo-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }

/* 업로드 프리뷰 */
.upload-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.upload-preview-item { position: relative; width: 80px; height: 80px; }
.upload-preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.upload-preview-item .remove { position: absolute; top: -6px; right: -6px; background: #ff4444; border: none; border-radius: 50%; width: 20px; height: 20px; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body class="theme-dark">
<div id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px">
    <div style="font-size:48px">📖</div>
    <div style="font-size:16px;font-weight:700">윤우 생각 불러오는 중...</div>
  </div>
</div>

<!-- 사진 전체화면 뷰어 -->
<div id="photo-viewer" class="photo-viewer" onclick="closeViewer()">
  <button class="photo-viewer-close" onclick="closeViewer()">✕</button>
  <img id="viewer-img" src="" onclick="event.stopPropagation()"/>
  <div class="photo-viewer-nav" onclick="event.stopPropagation()">
    <button id="viewer-prev" onclick="viewerNav(-1)">← 이전</button>
    <span id="viewer-counter" style="color:#fff;line-height:36px;font-size:13px"></span>
    <button id="viewer-next" onclick="viewerNav(1)">다음 →</button>
  </div>
</div>

<!-- 지혜 추가 모달 -->
<div id="modal-add" class="modal">
  <div class="modal-box">
    <div class="modal-title">✍️ 나만의 지혜 추가</div>
    <select id="w-cat" class="inp"></select>
    <textarea id="w-text" class="inp" rows="3" placeholder="지혜의 내용을 적어주세요"></textarea>
    <textarea id="w-child" class="inp" rows="2" placeholder="아이에게 쉽게 설명하는 말 (선택)"></textarea>
    <input id="w-author" class="inp" placeholder="출처 / 저자 (예: 공자, 아빠의 지혜)"/>
    <div class="row">
      <button class="btn btn-sub btn-full" onclick="closeModal('modal-add')">취소</button>
      <button class="btn btn-primary btn-full" id="btn-save-wisdom" onclick="saveWisdom()">☁️ 저장하기</button>
    </div>
  </div>
</div>

<!-- 지혜 수정 모달 -->
<div id="modal-edit" class="modal">
  <div class="modal-box">
    <div class="modal-title">✏️ 지혜 수정</div>
    <select id="e-cat" class="inp"></select>
    <textarea id="e-text" class="inp" rows="3" placeholder="지혜의 내용"></textarea>
    <textarea id="e-child" class="inp" rows="2" placeholder="아이에게 쉽게 설명하는 말 (선택)"></textarea>
    <input id="e-author" class="inp" placeholder="출처 / 저자"/>
    <div class="row">
      <button class="btn btn-sub btn-full" onclick="closeModal('modal-edit')">취소</button>
      <button class="btn btn-primary btn-full" id="btn-update-wisdom" onclick="updateWisdom()">✅ 수정 완료</button>
    </div>
  </div>
</div>

<!-- 지혜 상세 모달 -->
<div id="modal-detail" class="modal" onclick="closeModal('modal-detail')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="detail-content"></div>
    <div class="row" style="margin-top:16px">
      <button class="btn btn-sub btn-full" onclick="closeModal('modal-detail')">닫기</button>
      <button class="btn btn-primary btn-full" onclick="openEdit()">✏️ 수정</button>
      <button class="btn btn-danger btn-full" onclick="deleteWisdom()">🗑️ 삭제</button>
    </div>
  </div>
</div>

<!-- 타임캡슐 추가 모달 -->
<div id="modal-capsule" class="modal">
  <div class="modal-box">
    <div class="modal-title">💌 타임캡슐 메시지</div>
    <input id="c-title" class="inp" placeholder="제목 (예: 20살 생일에)"/>
    <textarea id="c-content" class="inp" rows="4" placeholder="성인이 된 아들에게 전하고 싶은 말..."></textarea>
    <input type="file" id="c-photo" accept="image/*" multiple style="display:none"/>
    <button class="btn btn-sub btn-full" style="margin-bottom:10px" onclick="document.getElementById('c-photo').click()">📷 사진 추가하기 (여러 장 가능)</button>
    <div id="c-preview" class="upload-preview"></div>
    <div id="c-upload-status" style="font-size:12px;color:var(--gold);margin-bottom:8px;text-align:center;min-height:18px"></div>
    <div class="row">
      <button class="btn btn-sub btn-full" onclick="closeCapsuleModal()">취소</button>
      <button class="btn btn-gold btn-full" id="btn-save-capsule" onclick="saveCapsule()">☁️ 저장하기</button>
    </div>
  </div>
</div>

<!-- 타임캡슐 상세 모달 -->
<div id="modal-capsule-detail" class="modal" onclick="closeModal('modal-capsule-detail')">
  <div class="modal-box" onclick="event.stopPropagation()" style="padding:0">
    <div id="capsule-detail-content"></div>
    <div class="row" style="padding:16px">
      <button class="btn btn-sub btn-full" onclick="closeModal('modal-capsule-detail')">닫기</button>
      <button class="btn btn-danger btn-full" onclick="deleteCapsule()">🗑️ 삭제</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div id="modal-settings" class="modal" onclick="closeModal('modal-settings')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">⚙️ 설정</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600">색상 테마</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">
      <button onclick="setTheme('dark')" id="theme-dark" style="padding:14px 16px;border-radius:12px;border:2px solid transparent;background:#0f0f1a;color:#eee;text-align:left;font-size:13px;cursor:pointer">🌙 <strong>다크</strong> — 기본 어두운 테마</button>
      <button onclick="setTheme('light')" id="theme-light" style="padding:14px 16px;border-radius:12px;border:2px solid transparent;background:#f0f4ff;color:#1a1a3e;text-align:left;font-size:13px;cursor:pointer">☀️ <strong>라이트</strong> — 파랑·노랑·빨강 밝은 테마</button>
      <button onclick="setTheme('pink')" id="theme-pink" style="padding:14px 16px;border-radius:12px;border:2px solid transparent;background:#fff0f5;color:#4a1030;text-align:left;font-size:13px;cursor:pointer">🌸 <strong>러블리</strong> — 핑크 감성 테마</button>
    </div>
    <button class="btn btn-sub btn-full" onclick="closeModal('modal-settings')">닫기</button>
  </div>
</div>

<script>
// ── Firebase ─────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyCkevLTZSv2VPxILJZCzh-DzeEF5oomB-U",
  authDomain: "yunu-thoughts.firebaseapp.com",
  projectId: "yunu-thoughts",
  storageBucket: "yunu-thoughts.firebasestorage.app",
  messagingSenderId: "185714037780",
  appId: "1:185714037780:web:d2c9c499eba8230ffe4301"
});
const db = firebase.firestore();
const CLOUD = "dasalfvtm", PRESET = "azdfmdd7";

// ── 상수 ─────────────────────────────────────────────────────────
const CATS = ["인성·가치관","철학·사상","실용적 지혜","관계·사랑","용기·도전","감사·행복"];
const COLORS = {"인성·가치관":"#6C63FF","철학·사상":"#3AAFA9","실용적 지혜":"#F4A261","관계·사랑":"#E76F51","용기·도전":"#2D6A4F","감사·행복":"#E9C46A"};
const ICONS = {"인성·가치관":"🌱","철학·사상":"🔭","실용적 지혜":"🛠️","관계·사랑":"❤️","용기·도전":"🦁","감사·행복":"✨"};

// ── 상태 ─────────────────────────────────────────────────────────
let wisdoms = [], capsules = [];
let tab = "today", todayIdx = 0, selCat = "전체", childMode = false;
let currentDetail = null, currentCapsuleDetail = null;
let theme = localStorage.getItem("theme") || "dark";
let pendingPhotos = []; // 업로드 대기 사진들
let viewerPhotos = [], viewerIdx = 0;

// ── 초기화 ───────────────────────────────────────────────────────
document.body.className = "theme-" + theme;

["w-cat","e-cat"].forEach(id => {
  const el = document.getElementById(id);
  if (el) CATS.forEach(c => {
    const o = document.createElement("option");
    o.value = c; o.textContent = c; el.appendChild(o);
  });
});

// 다중 사진 선택
document.getElementById("c-photo").addEventListener("change", function() {
  const files = Array.from(this.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      pendingPhotos.push({ file, preview: e.target.result });
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  });
  this.value = ""; // 같은 파일 재선택 허용
});

function renderPhotoPreview() {
  const el = document.getElementById("c-preview");
  if (!el) return;
  el.innerHTML = pendingPhotos.map((p, i) => `
    <div class="upload-preview-item">
      <img src="${p.preview}"/>
      <button class="remove" onclick="removePhoto(${i})">✕</button>
    </div>
  `).join("");
}

function removePhoto(i) {
  pendingPhotos.splice(i, 1);
  renderPhotoPreview();
}

// Firebase 로드
async function init() {
  try {
    const [wSnap, cSnap] = await Promise.all([
      db.collection("wisdoms").orderBy("createdAt").get(),
      db.collection("capsules").orderBy("date","desc").get()
    ]);
    wisdoms = wSnap.docs.map(d => ({...d.data(), id: d.id}));
    capsules = cSnap.docs.map(d => ({...d.data(), id: d.id}));
    todayIdx = new Date().getDate() % (wisdoms.length || 1);
  } catch(e) { console.error("로드 실패:", e); }
  renderApp();
}
init();

// ── 모달 ─────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function closeCapsuleModal() {
  closeModal("modal-capsule");
  document.getElementById("c-title").value = "";
  document.getElementById("c-content").value = "";
  document.getElementById("c-photo").value = "";
  document.getElementById("c-preview").innerHTML = "";
  document.getElementById("c-upload-status").textContent = "";
  pendingPhotos = [];
}

// ── 테마 ─────────────────────────────────────────────────────────
function setTheme(t) {
  theme = t; localStorage.setItem("theme", t);
  document.body.className = "theme-" + t;
  updateThemeBtns();
}
function updateThemeBtns() {
  ["dark","light","pink"].forEach(t => {
    const btn = document.getElementById("theme-" + t);
    if (btn) btn.style.borderColor = theme === t ? "var(--primary)" : "transparent";
  });
}

// ── 사진 뷰어 ────────────────────────────────────────────────────
function openViewer(photos, idx) {
  viewerPhotos = photos; viewerIdx = idx;
  updateViewer();
  document.getElementById("photo-viewer").classList.add("open");
}
function closeViewer() { document.getElementById("photo-viewer").classList.remove("open"); }
function updateViewer() {
  document.getElementById("viewer-img").src = viewerPhotos[viewerIdx];
  document.getElementById("viewer-counter").textContent = viewerPhotos.length > 1 ? `${viewerIdx+1} / ${viewerPhotos.length}` : "";
  document.getElementById("viewer-prev").style.display = viewerPhotos.length > 1 ? "" : "none";
  document.getElementById("viewer-next").style.display = viewerPhotos.length > 1 ? "" : "none";
}
function viewerNav(dir) {
  viewerIdx = (viewerIdx + dir + viewerPhotos.length) % viewerPhotos.length;
  updateViewer();
}

// ── Cloudinary 업로드 ─────────────────────────────────────────────
async function uploadPhoto(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`, {
    method: "POST", body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error(JSON.stringify(data));
  return data.secure_url;
}

// ── 지혜 저장 ────────────────────────────────────────────────────
async function saveWisdom() {
  const text = document.getElementById("w-text").value.trim();
  const child = document.getElementById("w-child").value.trim();
  const author = document.getElementById("w-author").value.trim();
  const category = document.getElementById("w-cat").value;
  if (!text) { alert("내용을 입력해주세요!"); return; }
  const btn = document.getElementById("btn-save-wisdom");
  btn.textContent = "저장 중..."; btn.disabled = true;
  try {
    const data = { category, text, child: child||"", author: author||"아빠의 지혜" };
    const ref = await db.collection("wisdoms").add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    wisdoms.push({...data, id: ref.id});
    closeModal("modal-add");
    document.getElementById("w-text").value = "";
    document.getElementById("w-child").value = "";
    document.getElementById("w-author").value = "";
    renderApp();
  } catch(e) { alert("저장 실패: " + e.message); }
  btn.textContent = "☁️ 저장하기"; btn.disabled = false;
}

// ── 지혜 수정 ────────────────────────────────────────────────────
function openEdit() {
  closeModal("modal-detail");
  document.getElementById("e-cat").value = currentDetail.category;
  document.getElementById("e-text").value = currentDetail.text;
  document.getElementById("e-child").value = currentDetail.child || "";
  document.getElementById("e-author").value = currentDetail.author || "";
  openModal("modal-edit");
}
async function updateWisdom() {
  const text = document.getElementById("e-text").value.trim();
  const child = document.getElementById("e-child").value.trim();
  const author = document.getElementById("e-author").value.trim();
  const category = document.getElementById("e-cat").value;
  if (!text) { alert("내용을 입력해주세요!"); return; }
  const btn = document.getElementById("btn-update-wisdom");
  btn.textContent = "저장 중..."; btn.disabled = true;
  try {
    const data = { category, text, child: child||"", author: author||"아빠의 지혜" };
    await db.collection("wisdoms").doc(currentDetail.id).update(data);
    wisdoms = wisdoms.map(w => w.id === currentDetail.id ? {...w, ...data} : w);
    currentDetail = null;
    closeModal("modal-edit");
    renderApp();
  } catch(e) { alert("수정 실패: " + e.message); }
  btn.textContent = "✅ 수정 완료"; btn.disabled = false;
}
async function deleteWisdom() {
  if (!confirm("이 지혜를 삭제할까요?")) return;
  try {
    await db.collection("wisdoms").doc(currentDetail.id).delete();
    wisdoms = wisdoms.filter(w => w.id !== currentDetail.id);
    currentDetail = null;
    closeModal("modal-detail");
    renderApp();
  } catch(e) { alert("삭제 실패: " + e.message); }
}

// ── 타임캡슐 저장 ────────────────────────────────────────────────
async function saveCapsule() {
  const title = document.getElementById("c-title").value.trim();
  const content = document.getElementById("c-content").value.trim();
  if (!content) { alert("내용을 입력해주세요!"); return; }
  const btn = document.getElementById("btn-save-capsule");
  const status = document.getElementById("c-upload-status");
  btn.disabled = true;

  try {
    let photoURLs = [];
    if (pendingPhotos.length > 0) {
      for (let i = 0; i < pendingPhotos.length; i++) {
        status.textContent = `📷 사진 업로드 중... (${i+1}/${pendingPhotos.length})`;
        btn.textContent = `업로드 중 ${i+1}/${pendingPhotos.length}`;
        const url = await uploadPhoto(pendingPhotos[i].file);
        photoURLs.push(url);
      }
    }
    status.textContent = "💾 저장 중...";
    btn.textContent = "저장 중...";
    const data = { title: title||"", content, photoURLs, date: new Date().toISOString().slice(0,10) };
    const ref = await db.collection("capsules").add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    capsules.unshift({...data, id: ref.id});
    closeCapsuleModal();
    renderApp();
  } catch(e) {
    console.error(e);
    alert("저장 실패: " + e.message);
  }
  btn.textContent = "☁️ 저장하기"; btn.disabled = false;
  status.textContent = "";
}

// ── 타임캡슐 삭제 ────────────────────────────────────────────────
async function deleteCapsule() {
  if (!confirm("이 타임캡슐을 삭제할까요?")) return;
  try {
    await db.collection("capsules").doc(currentCapsuleDetail.id).delete();
    capsules = capsules.filter(c => c.id !== currentCapsuleDetail.id);
    currentCapsuleDetail = null;
    closeModal("modal-capsule-detail");
    renderApp();
  } catch(e) { alert("삭제 실패: " + e.message); }
}

// ── 렌더 ─────────────────────────────────────────────────────────
function renderApp() {
  const today = wisdoms.length ? wisdoms[todayIdx % wisdoms.length] : null;
  const filtered = selCat === "전체" ? wisdoms : wisdoms.filter(w => w.category === selCat);

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:22px;font-weight:700">📖 윤우 생각</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">
            아들에게 남기는 아빠의 지혜
            <span style="background:var(--primary);opacity:0.8;color:#fff;border-radius:10px;padding:2px 8px;font-size:10px;margin-left:4px">☁️ 클라우드</span>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sub" onclick="childMode=!childMode;renderApp()" style="font-size:11px;padding:6px 12px">${childMode?"👦 아이":"👨 어른"}</button>
          <button class="btn btn-sub" onclick="openModal('modal-settings');updateThemeBtns()" style="font-size:14px;padding:6px 12px">⚙️</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab ${tab==="today"?"on":"off"}" onclick="tab='today';renderApp()">오늘의 지혜</button>
        <button class="tab ${tab==="archive"?"on":"off"}" onclick="tab='archive';renderApp()">지혜 창고</button>
        <button class="tab ${tab==="capsule"?"on":"off"}" onclick="tab='capsule';renderApp()">타임캡슐</button>
      </div>
    </div>

    <div class="content">

    ${tab==="today" ? `
      ${today ? `
        <div style="background:linear-gradient(135deg,${COLORS[today.category]}22,${COLORS[today.category]}11);border:1px solid ${COLORS[today.category]}55;border-radius:20px;padding:24px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <span class="badge" style="background:${COLORS[today.category]};color:#fff">${ICONS[today.category]} ${today.category}</span>
            <span style="font-size:11px;color:var(--text3)">${today.author||""}</span>
          </div>
          <p style="font-size:17px;line-height:1.8;margin:0;font-weight:500;color:var(--text)">${childMode?today.child||today.text:today.text}</p>
        </div>
        ${!childMode && today.child ? `
          <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px">
            <div style="font-size:11px;color:var(--primary);font-weight:700;margin-bottom:8px">👦 아이에게 이렇게 말해줘요</div>
            <p style="font-size:15px;color:var(--text2);margin:0;line-height:1.7">"${today.child}"</p>
          </div>` : ""}
        <button class="btn btn-primary btn-full" onclick="todayIdx=(todayIdx+1)%wisdoms.length;renderApp()" style="margin-bottom:12px;font-size:15px">다음 지혜 보기 →</button>
        <div style="text-align:center;font-size:12px;color:var(--text3)">총 ${wisdoms.length}개의 지혜가 모여 있어요</div>
      ` : `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
        <div style="font-size:40px;margin-bottom:12px">📭</div>
        <div style="font-size:14px">아직 지혜가 없어요.<br/>지혜 창고에서 추가해보세요!</div>
      </div>`}
    ` : ""}

    ${tab==="archive" ? `
      <button class="btn btn-full" onclick="openModal('modal-add')" style="background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:14px;margin-bottom:16px">✍️ 나만의 지혜 추가하기</button>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
        ${["전체",...CATS].map(c=>`
          <button onclick="selCat='${c}';renderApp()" style="background:${selCat===c?(COLORS[c]||"var(--primary)"):"var(--card)"};border:1px solid ${selCat===c?(COLORS[c]||"var(--primary)"):"var(--border)"};border-radius:20px;padding:6px 12px;color:${selCat===c?"#fff":"var(--text2)"};font-size:11px;font-weight:${selCat===c?700:400};cursor:pointer">
            ${c==="전체"?"✨ 전체":`${ICONS[c]} ${c}`}
          </button>`).join("")}
      </div>
      ${filtered.length === 0 ? `<div style="text-align:center;padding:40px 20px;color:var(--text3)">이 카테고리에 지혜가 없어요.</div>` : ""}
      ${filtered.map((w,i) => `
        <div class="card" style="border-color:${COLORS[w.category]}44" onclick="currentDetail=filteredWisdoms()[${i}];showDetail()">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:11px;color:${COLORS[w.category]};font-weight:600">${ICONS[w.category]} ${w.category}</span>
            <span style="font-size:11px;color:var(--text3)">${w.author||""}</span>
          </div>
          <p style="font-size:13px;color:var(--text2);margin:0;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${childMode?w.child||w.text:w.text}</p>
        </div>`).join("")}
    ` : ""}

    ${tab==="capsule" ? `
      <button class="btn btn-gold btn-full" onclick="openModal('modal-capsule')" style="font-size:14px;margin-bottom:16px">💌 새 메시지 남기기</button>
      <div style="background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;text-align:center">
        <div style="font-size:32px;margin-bottom:8px">🪄</div>
        <div style="font-size:15px;font-weight:700;color:var(--gold);margin-bottom:6px">성인이 된 아들에게</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.6">지금 이 마음을, 아들이 성인이 되었을 때<br/>전달할 메시지를 담아두세요.</div>
      </div>
      ${capsules.length===0 ? `<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px 0">아직 메시지가 없어요.<br/>첫 번째 타임캡슐을 남겨보세요 💌</div>` : ""}
      ${capsules.map((c,i) => `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer" onclick="currentCapsuleDetail=capsules[${i}];showCapsuleDetail()">
          ${(c.photoURLs||[]).length > 0 ? `
            <div style="position:relative">
              <img src="${(c.photoURLs||[])[0]}" style="width:100%;height:160px;object-fit:cover;display:block"/>
              ${(c.photoURLs||[]).length > 1 ? `<span style="position:absolute;bottom:8px;right:8px;background:#00000088;color:#fff;border-radius:10px;padding:2px 8px;font-size:11px">+${(c.photoURLs||[]).length-1}장</span>` : ""}
            </div>` : ""}
          <div style="padding:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:13px;font-weight:700;color:var(--gold)">💌 ${c.title||"아들에게"}</span>
              <span style="font-size:11px;color:var(--text3)">${c.date||""}</span>
            </div>
            <p style="font-size:13px;color:var(--text2);margin:0;line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${c.content}</p>
          </div>
        </div>`).join("")}
    ` : ""}

    </div>
  `;
}

function filteredWisdoms() {
  return selCat === "전체" ? wisdoms : wisdoms.filter(w => w.category === selCat);
}

function showDetail() {
  const w = currentDetail;
  document.getElementById("detail-content").innerHTML = `
    <span class="badge" style="background:${COLORS[w.category]};color:#fff">${ICONS[w.category]} ${w.category}</span>
    <p style="font-size:16px;line-height:1.8;margin-top:16px;color:var(--text)">${w.text}</p>
    ${w.child ? `
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:12px">
        <div style="font-size:11px;color:var(--primary);font-weight:700;margin-bottom:6px">👦 아이에게</div>
        <p style="font-size:14px;color:var(--text2);margin:0;line-height:1.7">"${w.child}"</p>
      </div>` : ""}
    <div style="font-size:11px;color:var(--text3);margin-top:12px;text-align:right">— ${w.author||""}</div>
  `;
  openModal("modal-detail");
}

function showCapsuleDetail() {
  const c = currentCapsuleDetail;
  const photos = c.photoURLs || (c.photoURL ? [c.photoURL] : []);
  document.getElementById("capsule-detail-content").innerHTML = `
    ${photos.length > 0 ? `
      <div style="border-radius:24px 24px 0 0;overflow:hidden">
        ${photos.length === 1
          ? `<img src="${photos[0]}" style="width:100%;max-height:260px;object-fit:cover;display:block;cursor:zoom-in" onclick="openViewer(${JSON.stringify(photos)},0)"/>`
          : `<div class="photo-grid" style="padding:12px 12px 0">
              ${photos.map((url,i)=>`<img src="${url}" onclick="openViewer(${JSON.stringify(photos)},${i})" style="border-radius:8px;cursor:zoom-in"/>`).join("")}
            </div>`
        }
      </div>` : ""}
    <div style="padding:24px 24px 8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700;color:var(--gold)">💌 ${c.title||"아들에게"}</span>
        <span style="font-size:11px;color:var(--text3)">${c.date||""}</span>
      </div>
      <p style="font-size:14px;color:var(--text2);margin:0;line-height:1.8">${c.content}</p>
    </div>
  `;
  openModal("modal-capsule-detail");
}
</script>
</body>
</html>
